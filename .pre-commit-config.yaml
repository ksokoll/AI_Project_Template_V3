repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
      - id: ruff-format
 
# mypy is intentionally excluded from pre-commit.
# It runs in an isolated venv without access to your project dependencies
# (pydantic, fastapi, etc.) and will produce false import-not-found errors.
# Run mypy via: make lint  or  the CI workflow.
 